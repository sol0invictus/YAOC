appId: com.yaoa.notes
productName: Yaoa Notes
copyright: Copyright © 2025

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.productivity
  darkModeSupport: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
